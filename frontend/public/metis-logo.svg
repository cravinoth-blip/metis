<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 58 100">
  <rect width="58" height="100" fill="#1a1a1a"/>

  <!-- 5 rays radiating from top of circle -->
  <line x1="29" y1="22" x2="4"  y2="3"  stroke="white" stroke-width="3.5"/>
  <line x1="29" y1="22" x2="13" y2="1"  stroke="white" stroke-width="3.5"/>
  <line x1="29" y1="22" x2="29" y2="0"  stroke="white" stroke-width="3.5"/>
  <line x1="29" y1="22" x2="45" y2="1"  stroke="white" stroke-width="3.5"/>
  <line x1="29" y1="22" x2="55" y2="3"  stroke="white" stroke-width="3.5"/>

  <!-- Circle -->
  <circle cx="29" cy="41" r="19" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Vertical stem -->
  <line x1="29" y1="60" x2="29" y2="98" stroke="white" stroke-width="3.5"/>

  <!-- Horizontal crossbar -->
  <line x1="10" y1="81" x2="48" y2="81" stroke="white" stroke-width="3.5"/>
</svg>
